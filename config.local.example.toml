# Copy thanh config.local.toml va dien. KHONG commit file config.local.toml (da gitignore).
[webhook]
url = "https://n8n.svnagentic.site/webhook/<id>?user=1"
# (tuy chon) webhook PHU nhan ban sao snapshot (fan-out). Mac dinh da tro
# dashboard DAKROSA portal (hang so EXTRA_URL trong bridge/poster.py, doi qua OTA).
# Chi khai bao neu muon ghi de. Loi ben phu KHONG anh huong luong chinh (n8n).
# extra_url = "https://dakrosa.svnagentic.site/api/dakrosa/wincc/webhook"

[station]
# Tram nay ten gi -> n8n biet phan biet payload cua may nao gui.
# Neu KHONG dat, reader mac dinh "Dakrosa1" (tuong thich nguoc).
name = "Dakrosa1"
# Phase 1 callback canary tu bat CHI khi name=Dakrosa2, mode=local, read_mode=raw.
# Kill switch tuc thi sau khi restart service:
# runtime_callback_canary = false
# WinCC catalog pattern (SQL LIKE): CC[_]<ten>[_]%R (dau _ trong ngoac de escape)
project_like = "CC[_]Dakrosa1[_]%R"
# Catalog fallback neu resolve khong ra. Bo trong = reader tu tim.
catalog_fallback = ""

[winccbox]
# mode = "remote" (mac dinh): may nay SSH sang may WinCC offline
# mode = "local" : may nay CHINH la may WinCC (chay reader tai cho, khong SSH)
mode = "remote"

# ==== Che do REMOTE (setup.bat) ====
host = "169.254.172.61"
user = "dell"
key = "C:/Users/<bridgeuser>/.ssh/winccbox_ed25519"
# (tuy chon) dung alias thay cho host/user: target = "winccbox"

# ==== Che do LOCAL (setup-local.bat) ====
# Bo qua host/user/key. Chi can python32 + reader tro tro tren MAY NAY.
# python32: Python 32-bit (bat buoc de pywin32 goi WinCCOLEDBProvider).
# reader:   duong dan oledb_reader.py (trong repo checkout).
python32 = "C:/Python311x86/python.exe"
reader = "C:/Users/<user>/wincc-bridge/box/oledb_reader.py"

# [tags] = ban do ValueID cua tram (ten_tag = ValueID). BO QUA de dung MAP mac
# dinh Dakrosa1 (ValueID 1-43). Tram khac co ValueID rieng -> khai bao o day.
# Lay ValueID that: chay tren may WinCC:
#   SELECT ValueID, ValueName FROM [<archive_db>].dbo.Archive
# Giu ten chuan bus_P/u1_P/u2_P/u3_P de tinh energy_5min + dashboard khong doi.
# Vi du Dakrosa2 (bo comment neu dung):
# [tags]
# bus_P = 2324
# bus_Q = 2304
# bus_PF = 2344
# bus_F = 2234
# u1_P = 58
# u1_Q = 61
# u1_speed = 994
# u2_P = 326
# u2_Q = 329
# u2_speed = 1404
# u3_P = 393
# u3_Q = 396
# u3_speed = 1624

[intervals]
# snapshot_sec: code (bridge/service.py SNAPSHOT_SEC_MAX=30) ep TRAN <=30s ->
# gia tri o day chi lam NHANH hon (vd 15), khong cham hon. De trong / 300 cung
# thanh 30s. Doi nhip realtime cho ca fleet -> sua SNAPSHOT_SEC_MAX roi OTA.
snapshot_sec = 30
ota_sec = 180
# rawship_sec: chu ky gui RAW DUMP TagCompressed (b64) len server decode du tag.
# Chay o MOI tram (local lan remote/SSH). 0 = tat.
# Mac dinh 300s (hang so RAW_SHIP_SEC trong bridge/service.py, doi qua OTA).
# rawship_sec = 300

[ota]
enabled = true
repo = "https://github.com/ty1563/wincc-bridge.git"
branch = "main"
# token nhap luc setup.bat -> git remote duoc set kem token, KHONG luu o day
